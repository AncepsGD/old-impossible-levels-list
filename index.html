<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Old Impossible Levels List</title>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>The Old Impossible Levels List</h1>
      <p style="margin: 8px 0 0 0">
        <a
          href="https://discord.gg/example"
          target="_blank"
          style="
            color: var(--purple-light);
            font-size: 12px;
            text-decoration: none;
          "
          >Join our Discord</a
        >
      </p>
    </header>

    <div class="stats-bar">
      <div class="stat-cell">
        <span class="stat-label">Verified</span>
        <span class="stat-value green" id="statVerified">—</span>
        <span class="stat-sub">beaten legitimately</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">Unverified</span>
        <span class="stat-value red" id="statUnverified">—</span>
        <span class="stat-sub">still standing</span>
      </div>
      <div class="stat-cell">
        <span class="stat-value purple" id="statPercent">—</span>
        <span class="stat-sub" id="statPercentSub">of the list completed</span>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input
          type="text"
          id="searchInput"
          placeholder="Search by name, creator, or level ID…"
          aria-label="Search levels by name, creator, or level ID"
        />
      </div>
      <select
        id="filterStatus"
        aria-label="Filter levels by verification status"
      >
        <option value="all">All Statuses</option>
        <option value="verified">Verified</option>
        <option value="unverified">Unverified</option>
      </select>
      <select id="filterDuo" aria-label="Filter levels by player mode">
        <option value="all">Solo &amp; 2-Player</option>
        <option value="solo">Solo Only</option>
        <option value="duo">2-Player Only</option>
      </select>
      <button
        class="btn-sort"
        id="sortBtn"
        onclick="toggleSort()"
        aria-label="Toggle sort order by rank"
      >
        ▲ RANK
      </button>
      <button
        class="btn-sort"
        id="editBtn"
        onclick="openEditMode()"
        aria-label="Open list editor"
        style="
          background: var(--purple);
          color: #fff;
          border-color: var(--purple);
        "
      >
        ✎ EDIT
      </button>
    </div>

    <div>
      <div class="list-header">
        <div class="lh-cell">#</div>
        <div class="lh-cell">Thumbnail</div>
        <div class="lh-cell">Level Info</div>
        <div class="lh-cell">World Record</div>
      </div>
      <div id="levelList"></div>
    </div>

    <div class="modal-backdrop" id="modal" onclick="closeModal(event)">
      <div
        class="modal"
        id="modalBox"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalHero"
      >
        <button
          class="modal-close"
          onclick="closeModalDirect()"
          aria-label="Close level details"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
        <div class="modal-hero" id="modalHero"></div>
        <div class="modal-grid" id="modalGrid"></div>
      </div>
    </div>

    <div class="edit-overlay" id="editOverlay">
      <div class="edit-bar">
        <span class="edit-bar-title">List Editor</span>
        <span class="edit-bar-count" id="editCount">0 levels</span>
        <div class="edit-search-wrap">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            type="text"
            id="editSearch"
            placeholder="Filter levels…"
            aria-label="Filter levels in editor"
          />
        </div>
        <button class="edit-action-btn add" onclick="addLevel()">
          + Add Level
        </button>
        <button class="edit-action-btn copy" onclick="importJSON()">
          Import JSON
        </button>
        <button class="edit-action-btn copy" onclick="copyJSON()">
          Copy JSON
        </button>
        <button class="edit-action-btn close-edit" onclick="closeEditMode()">
          ✕ Close
        </button>
      </div>
      <div class="edit-list" id="editList"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
  </body>
</html>
